<div class="no-project-container">
  <header class="header">
    <h1>Sem Acesso a Projetos</h1>
    <button class="btn-logout" (click)="logout()">Sair</button>
  </header>

  <main class="content">
    <div class="message">
      <h2>Você não está vinculado a nenhum projeto</h2>
      <p>Para começar a trabalhar, é necessário ser adicionado a um projeto pelo administrador.</p>
      <p class="highlight">Entre em contato com o administrador do sistema para ser incluído em um projeto.</p>
    </div>
  </main>
</div>
